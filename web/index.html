<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notion 转手机图 Web App</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Notion HTML to Mobile Images</p>
      <h1>导出前预览 + 高清导出</h1>
    </div>
    <p id="globalStatus" class="status idle">Idle</p>
  </header>

  <main class="layout">
    <aside class="panel controls">
      <h2>参数</h2>
      <form id="settingsForm">
        <div class="group">
          <h3>HTML 文件</h3>
          <div id="htmlDropzone" class="dropzone" tabindex="0">
            <p class="drop-title">拖拽 HTML 到这里</p>
            <p class="drop-sub">或点击下面按钮从文件管理器选择</p>
            <button id="btnPickHtml" type="button" class="ghost">选择 HTML 文件</button>
          </div>
          <label>
            当前 HTML 路径
            <input id="htmlPath" type="text" placeholder="/path/to/post.html" required readonly />
          </label>
        </div>
        <label>
          <span class="field-title">CSS 样式路径</span>
          <input id="cssPath" type="text" placeholder="可留空，默认项目内 my.css" />
        </label>

        <details class="group collapsible" open>
          <summary>导出图片选项</summary>
          <div class="group-body">
            <div class="grid2">
              <label class="param-label" data-param-key="sizePreset">
                <span class="field-title">尺寸预设</span>
                <select id="sizePreset">
                  <option value="1200x1600">1200 x 1600（3:4 常规图文）</option>
                  <option value="1440x2400">1440 x 2400（满屏打开）</option>
                </select>
                <span class="help-dot" title="">?</span>
              </label>
              <label class="param-label" data-param-key="width">
                <span class="field-title">宽度(px)</span>
                <input id="width" type="number" min="1" readonly />
                <span class="help-dot" title="">?</span>
              </label>
              <label class="param-label" data-param-key="height">
                <span class="field-title">高度(px)</span>
                <input id="height" type="number" min="1" readonly />
                <span class="help-dot" title="">?</span>
              </label>
              <label class="param-label" data-param-key="sidePadding">
                <span class="field-title">左右留白(px)</span>
                <input id="sidePadding" type="number" min="0" />
                <span class="help-dot" title="">?</span>
              </label>
              <label class="param-label" data-param-key="topPadding">
                <span class="field-title">上留白(px)</span>
                <input id="topPadding" type="number" min="0" />
                <span class="help-dot" title="">?</span>
              </label>
              <label class="param-label" data-param-key="bottomPadding">
                <span class="field-title">下留白(px)</span>
                <input id="bottomPadding" type="number" min="0" />
                <span class="help-dot" title="">?</span>
              </label>
              <label class="param-label" data-param-key="slicePadding">
                <span class="field-title">切图上下留白(px)</span>
                <input id="slicePadding" type="number" min="0" />
                <span class="help-dot" title="">?</span>
              </label>
            </div>
            <p id="ratioHint" class="field-hint">尺寸由预设固定，不再按比例自动计算。</p>
          </div>
        </details>

        <details class="group collapsible" open>
          <summary>导出参数选项</summary>
          <div class="group-body">
            <div class="grid2">
              <label class="param-label" data-param-key="previewSupersample">
                <span class="field-title">预览清晰度(倍率)</span>
                <input id="previewSupersample" type="number" step="0.1" min="0.5" />
                <span class="help-dot" title="">?</span>
              </label>
              <label class="param-label" data-param-key="exportSupersample">
                <span class="field-title">导出清晰度(倍率)</span>
                <input id="exportSupersample" type="number" step="0.1" min="1" />
                <span class="help-dot" title="">?</span>
              </label>
              <label class="param-label" data-param-key="exportSharpen">
                <span class="field-title">导出锐化强度</span>
                <input id="exportSharpen" type="number" min="0" />
                <span class="help-dot" title="">?</span>
              </label>
            </div>
          </div>
        </details>

        <details class="group collapsible" open>
          <summary>切分策略选项</summary>
          <div class="group-body">
            <div class="grid2">
              <label class="param-label" data-param-key="cutMode">
                <span class="field-title">切分模式</span>
                <select id="cutMode">
                  <option value="smart">智能切分</option>
                  <option value="hard">硬切分</option>
                </select>
                <span class="help-dot" title="">?</span>
              </label>
              <label class="param-label" data-param-key="searchRange">
                <span class="field-title">搜索范围(px)</span>
                <input id="searchRange" type="number" min="0" />
                <span class="help-dot" title="">?</span>
              </label>
              <label class="param-label" data-param-key="minSegHeight">
                <span class="field-title">最小分段高度(px)</span>
                <input id="minSegHeight" type="number" min="1" />
                <span class="help-dot" title="">?</span>
              </label>
              <label class="param-label" data-param-key="whiteThreshold">
                <span class="field-title">空白阈值</span>
                <input id="whiteThreshold" type="number" min="0" max="255" />
                <span class="help-dot" title="">?</span>
              </label>
              <label class="param-label" data-param-key="whiteRowRatio">
                <span class="field-title">空白行比例</span>
                <input id="whiteRowRatio" type="number" step="0.001" min="0" max="1" />
                <span class="help-dot" title="">?</span>
              </label>
              <label class="param-label" data-param-key="waitMs">
                <span class="field-title">额外等待(ms)</span>
                <input id="waitMs" type="number" min="0" />
                <span class="help-dot" title="">?</span>
              </label>
            </div>
          </div>
        </details>
      </form>
      <div class="actions">
        <button id="btnPreview" class="primary">生成全文预览</button>
        <button id="btnExport">开始高清导出</button>
      </div>
    </aside>

    <section class="panel preview">
      <div class="preview-head">
        <h2>全文预览</h2>
        <p id="previewMeta">未生成预览</p>
      </div>
      <div class="preview-shell">
        <div id="pages" class="pages"></div>
      </div>
    </section>

    <aside class="panel side">
      <h2>任务信息</h2>
      <div class="kv">
        <div><span>当前任务</span><strong id="taskKind">-</strong></div>
        <div><span>状态</span><strong id="taskState">-</strong></div>
        <div><span>页数</span><strong id="taskPages">-</strong></div>
        <div><span>输出目录</span><strong id="taskOutput">-</strong></div>
      </div>
      <div class="actions">
        <button id="btnOpenOutput">打开输出目录</button>
      </div>
    </aside>
  </main>

  <script src="/static/app.js" defer></script>
</body>
</html>
